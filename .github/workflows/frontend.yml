name: Frontend

on:
  push:
    branches: [main]
    paths-ignore: ["contracts/**", "**.md"]
  pull_request:
    paths-ignore: ["contracts/**", "**.md"]

jobs:
  build:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
