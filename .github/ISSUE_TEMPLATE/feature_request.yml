name: Feature request
description: Propose an improvement or new capability
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who has it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. Include API sketches or economics if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: phase
    attributes:
      label: Roadmap fit
      description: Which phase does this belong to? (see ROADMAP.md)
      options:
        - Phase 1 — Core Packs
        - Phase 2 — Progression
        - Phase 3 — Platform
        - Phase 4 — Community
        - Unsure
